<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Scratch Followers</title>
</head>
<body>

<h1 id="count">読み込み中...</h1>

<script>
async function updateFollowers() {
    const username = "mamedaihuku777";
    let totalFollowers = 0;
    let offset = 0;
    const limit = 40;

    while (true) {
        const url = `https://scartch-api-mamedaihuku777.zaisheng124.workers.dev/users/${username}/followers?limit=${limit}&offset=${offset}`;
        const res = await fetch(url);
        const data = await res.json();

        if (data.length === 0) break;

        totalFollowers += data.length;
        offset += limit;
    }

    document.getElementById("count").innerText =
        `${username} のフォロワー数: ${totalFollowers}`;
}

setInterval(updateFollowers, 2000);
updateFollowers();
</script>

</body>
</html>
